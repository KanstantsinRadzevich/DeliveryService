<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Подтверждение доставки</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .container { max-width: 500px; margin-top: 50px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="card-body text-center">
        <h2 class="card-title mb-4">✅ Подтверждение получения</h2>
        <div id="orderInfo" class="mb-4"></div>
        <div id="actionArea"></div>
        <div id="message" class="mt-3"></div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyfPRijNUlmnlTFHZKGxClbBN_7d1ciI5iohs9AwOKcXNxZmfJBzTPdLT1-jmvetI4_/exec'; // ЗАМЕНИТЕ

    function jsonpRequest(url, callbackName, successCallback) {
      const script = document.createElement('script');
      const callbackFunc = 'jsonp_callback_' + Math.round(100000 * Math.random());
      window[callbackFunc] = function(data) {
        delete window[callbackFunc];
        document.body.removeChild(script);
        successCallback(data);
      };
      const separator = url.indexOf('?') === -1 ? '?' : '&';
      script.src = url + separator + 'callback=' + callbackFunc;
      document.body.appendChild(script);
    }

    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');

    if (!code) {
      document.getElementById('orderInfo').innerHTML = '<div class="alert alert-danger">Не указан код подтверждения</div>';
    } else {
      const url = `${API_URL}?action=getOrderByCode&code=${encodeURIComponent(code)}`;
      jsonpRequest(url, 'callback', function(response) {
        if (response.success) {
          displayOrder(response.order);
        } else {
          document.getElementById('orderInfo').innerHTML = `<div class="alert alert-warning">${response.error || 'Заказ не найден'}</div>`;
        }
      });
    }

    function displayOrder(order) {
      const infoDiv = document.getElementById('orderInfo');
      const actionDiv = document.getElementById('actionArea');
      
      if (!order) {
        infoDiv.innerHTML = '<div class="alert alert-warning">Заказ не найден</div>';
        return;
      }

      if (order.status === 'Доставлен') {
        infoDiv.innerHTML = '<div class="alert alert-success">Этот заказ уже был доставлен ранее.</div>';
        return;
      }

      infoDiv.innerHTML = `
        <p><strong>Товар:</strong> ${order.product || '—'}</p>
        <p><strong>Покупатель:</strong> ${order.customer || '—'}</p>
        <p><strong>Адрес доставки:</strong> ${order.address || '—'}</p>
        <p><strong>Дата доставки:</strong> ${order.date || '—'}</p>
      `;

      actionDiv.innerHTML = `
        <button class="btn btn-success btn-lg" onclick="confirmDelivery('${order.code}')">
          📦 Подтвердить получение
        </button>
      `;
    }

    function confirmDelivery(code) {
      const url = `${API_URL}?action=confirm&code=${encodeURIComponent(code)}`;
      jsonpRequest(url, 'callback', function(response) {
        if (response.success) {
          document.getElementById('actionArea').innerHTML = '';
          document.getElementById('orderInfo').innerHTML = '<div class="alert alert-success">Спасибо! Доставка подтверждена.</div>';
        } else {
          document.getElementById('message').innerHTML = `<div class="alert alert-danger">${response.error || 'Ошибка'}</div>`;
        }
      });
    }
  </script>
</body>
</html>
