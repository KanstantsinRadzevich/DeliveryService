<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мои доставки</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    body {
      background-color: #f8f9fa;
    }

    .container {
      max-width: 600px;
      margin-top: 20px;
    }

    .order-card {
      transition: 0.2s;
    }

    .status-badge {
      font-size: 0.85rem;
    }

    #loading {
      display: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1 class="mb-4">📦 Мои доставки</h1>

    <div class="card mb-4">
      <div class="card-body">
        <div class="input-group">
          <input type="text" class="form-control" id="courierName" placeholder="Введите ваше имя" value="">
          <button class="btn btn-primary" onclick="loadOrders()">Показать</button>
        </div>
      </div>
    </div>

    <!-- Кнопка построения общего маршрута -->
    <div class="d-grid gap-2 mb-3">
      <button class="btn btn-success" onclick="openRouteMap()">
        <i class="bi bi-map"></i> Построить оптимальный маршрут по всем заказам
      </button>
    </div>

    <div id="ordersList"></div>
    <div id="status" class="text-center text-muted my-3"></div>
    <div class="text-center text-secondary small mt-4">Обновлено: <span id="updateTime"></span></div>
  </div>

  <!-- Модальное окно для QR-кода -->
  <div class="modal fade" id="qrModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">QR-код подтверждения</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body text-center">
          <div id="qrImage" class="qr-code"></div>
          <p class="mt-2">Клиент должен отсканировать код, чтобы подтвердить получение.</p>
          <p class="small text-break" id="qrLink"></p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Укажите URL вашего развернутого веб-приложения (без слеша в конце)
    const API_URL = 'https://script.google.com/macros/s/AKfycbyfPRijNUlmnlTFHZKGxClbBN_7d1ciI5iohs9AwOKcXNxZmfJBzTPdLT1-jmvetI4_/exec'; // ЗАМЕНИТЕ НА СВОЙ

    function jsonpRequest(url, callbackName, successCallback) {
      const script = document.createElement('script');
      const callbackFunc = 'jsonp_callback_' + Math.round(100000 * Math.random());
      window[callbackFunc] = function (data) {
        delete window[callbackFunc];
        document.body.removeChild(script);
        successCallback(data);
      };
      const separator = url.indexOf('?') === -1 ? '?' : '&';
      script.src = url + separator + 'callback=' + callbackFunc;
      document.body.appendChild(script);
    }

    function loadOrders() {
      const courier = document.getElementById('courierName').value.trim();
      if (!courier) {
        showError('Введите имя курьера');
        return;
      }
      localStorage.setItem('courierName', courier);

      document.getElementById('ordersList').innerHTML = '';
      document.getElementById('status').innerHTML = '<div class="spinner-border text-primary" role="status"><span class="visually-hidden">Загрузка...</span></div>';

      const url = `${API_URL}?action=getOrders&courier=${encodeURIComponent(courier)}`;
      console.log(url);
      jsonpRequest(url, 'callback', function (response) {
        if (response.success) {
          displayOrders(response.orders);
        } else {
          showError(response.error || 'Неизвестная ошибка');
        }
      });
    }

    function displayOrders(orders) {
      const container = document.getElementById('ordersList');
      const statusDiv = document.getElementById('status');

      if (!orders || orders.length === 0) {
        statusDiv.innerHTML = 'Нет заказов для этого курьера';
        container.innerHTML = '';
        return;
      }

      statusDiv.innerHTML = `Найдено заказов: ${orders.length}`;

      let html = '';
      orders.forEach(order => {
        const statusClass =
          order.status === 'Доставлен' ? 'bg-success' :
            order.status === 'В пути' ? 'bg-primary' :
              order.status === 'Отменён' ? 'bg-danger' : 'bg-secondary';

        html += `
          <div class="card order-card mb-3">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-start mb-2">
                <h5 class="card-title mb-0">${order.product || 'Товар'}</h5>
                <span class="badge ${statusClass} status-badge">${order.status || 'Новый'}</span>
              </div>
              <p class="card-text mb-1"><strong>Клиент:</strong> ${order.customer || '—'}</p>
              <p class="card-text mb-1"><strong>Адрес:</strong> ${order.address || '—'}</p>
              <p class="card-text mb-2"><strong>Дата:</strong> ${order.date || '—'}</p>
              ${order.id ? `<p class="card-text small text-muted">№ заказа: ${order.id}</p>` : ''}
              
              <div class="d-flex gap-2 mt-2">
                ${order.status !== 'Доставлен' ? `
                  <button class="btn btn-sm btn-outline-primary" onclick="showQR('${order.code}', '${order.id}')">
                    <i class="bi bi-qr-code"></i> QR
                  </button>
                ` : ''}
                <button class="btn btn-sm btn-outline-success" onclick="openSingleRoute('${order.address}')">
                  <i class="bi bi-geo-alt"></i> Маршрут
                </button>
              </div>
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
      document.getElementById('updateTime').innerText = new Date().toLocaleString();
    }

    // function showQR(code, orderId) {
    //   const baseUrl = window.location.origin + window.location.pathname;
    //   // Ссылка на страницу подтверждения (confirm.html должна быть в той же папке)
    //   const confirmUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1) + 'confirm.html?code=' + encodeURIComponent(code);
    //   console.log(confirmUrl);
    //   const qrImageUrl = `https://chart.googleapis.com/chart?chs=200x200&cht=qr&chl=${encodeURIComponent(confirmUrl)}&choe=UTF-8`;

    //   document.getElementById('qrImage').innerHTML = `<img src="${qrImageUrl}" alt="QR-код" class="img-fluid">`;
    //   document.getElementById('qrLink').innerText = confirmUrl;

    //   const modal = new bootstrap.Modal(document.getElementById('qrModal'));
    //   modal.show();
    // }
    function showQR(code, orderId) {
      // Базовый URL вашего хостинга (где лежат HTML-файлы)
      const BASE_URL = 'https://kanstantsinradzevich.github.io/DeliveryService/';
      const confirmUrl = `${BASE_URL}/confirm.html?code=${encodeURIComponent(code)}`;

      const qrImageUrl = `https://chart.googleapis.com/chart?chs=200x200&cht=qr&chl=${encodeURIComponent(confirmUrl)}&choe=UTF-8`;

      document.getElementById('qrImage').innerHTML = `<img src="${qrImageUrl}" alt="QR-код" class="img-fluid">`;
      document.getElementById('qrLink').innerText = confirmUrl;

      const modal = new bootstrap.Modal(document.getElementById('qrModal'));
      modal.show();
    }

    function openSingleRoute(address) {
      if (!address) {
        alert('Адрес не указан');
        return;
      }

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const currentPos = `${position.coords.latitude},${position.coords.longitude}`;
            const url = `https://www.google.com/maps/dir/${currentPos}/${encodeURIComponent(address)}`;
            window.open(url, '_blank');
          },
          () => {
            const url = `https://www.google.com/maps/dir/${encodeURIComponent(address)}`;
            window.open(url, '_blank');
          }
        );
      } else {
        const url = `https://www.google.com/maps/dir/${encodeURIComponent(address)}`;
        window.open(url, '_blank');
      }
    }

    function openRouteMap() {
      const courier = document.getElementById('courierName').value.trim();
      if (!courier) {
        alert('Сначала введите имя курьера');
        return;
      }
      localStorage.setItem('courierName', courier);
      window.location.href = 'route.html';
    }

    function showError(error) {
      document.getElementById('status').innerHTML = `<div class="alert alert-danger">Ошибка: ${error}</div>`;
    }

    window.onload = function () {
      const saved = localStorage.getItem('courierName');
      if (saved) {
        document.getElementById('courierName').value = saved;
        loadOrders();
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>


</html>
